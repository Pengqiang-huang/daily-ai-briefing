# Daily AI Briefing 配置文件
# 所有阈值、数据源、关键词都在这里修改，无需改代码

# arXiv 论文抓取
arxiv:
  max_results_per_query: 30        # 每个搜索词最多抓几篇
  cutoff_days: 730                 # 只要近 N 天内的论文
  eval_max_papers: 15              # 最多评几篇论文（省钱）
  final_papers: 2                  # 最终推送几篇论文

# 论文筛选阈值
paper:
  high_priority_min_score: 6       # 高优先级论文最低分
  medium_priority_min_score: 4     # 中优先级论文最低分
  batch_size: 5                    # 批量分析每批几篇

# 新闻抓取
news:
  max_per_source: 15               # 每个源最多抓几条
  eval_max_news: 30                # 最多评几条新闻
  min_score: 6                     # 新闻最低分阈值
  final_count: 3                   # 最终推送几条新闻
  funding_keywords:                # 一票否决的融资关键词
    - 融资
    - 融了
    - 数亿元
    - 亿元融资
    - 千万元
    - 获投
    - 完成融资
    - 种子轮
    - 天使轮
    - A轮
    - B轮
    - C轮
    - D轮
    - Pre-IPO
    - IPO
    - 上市
    - 估值
    - funding
    - raised
    - series a
    - series b
    - series c
    - seed round
    - venture
    - valuation
    - went public

# GitHub Trending
github:
  languages:                       # 抓哪些语言的 trending
    - python
    - cpp
    - typescript
    - rust
  max_per_lang: 3                  # 每语言前几个
  min_score: 5                     # GitHub 仓库最低分
  final_count: 3                   # 最终推送几个

